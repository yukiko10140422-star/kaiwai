<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="508" height="508" x="2" y="2" rx="106" fill="none" stroke="#334155" stroke-width="2" opacity="0.5"/>
  <!-- KAIWAI text -->
  <text x="256" y="280" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="88" fill="url(#accent)" text-anchor="middle" letter-spacing="6" filter="url(#glow)">KAIWAI</text>
  <!-- Accent line -->
  <rect x="126" y="320" width="260" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
